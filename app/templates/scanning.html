{% extends "base.html" %}

{% block title %}Scanning... — Photo Cleaner{% endblock %}

{% block content %}
<hgroup>
    <h1>Scanning Your Photos</h1>
    <p id="status-text">Starting scan...</p>
</hgroup>

<progress id="scan-progress" value="0" max="100"></progress>
<p><small id="progress-detail">Preparing...</small></p>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const progress = document.getElementById('scan-progress');
    const statusText = document.getElementById('status-text');
    const detail = document.getElementById('progress-detail');

    const stageLabels = {
        'starting': 'Starting scan...',
        'listing': 'Listing photos from cloud storage...',
        'exact_matching': 'Finding exact duplicates...',
        'hashing': 'Analyzing photos for visual similarity...',
    };

    // Start the scan
    fetch('{{ url_for("web.scan_start") }}', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
            'X-CSRFToken': '{{ csrf_token() }}'
        },
        body: 'threshold=10'
    })
    .then(function(response) { return response.json(); })
    .then(function(data) {
        if (data.error) {
            statusText.textContent = 'Error: ' + data.error;
            return;
        }
        // Poll for progress every 2 seconds
        pollProgress();
    })
    .catch(function(err) {
        statusText.textContent = 'Failed to start scan: ' + err;
    });

    function pollProgress() {
        fetch('{{ url_for("web.scan_progress") }}')
        .then(function(response) { return response.json(); })
        .then(function(d) {
            statusText.textContent = stageLabels[d.stage] || d.stage;

            if (d.total > 0) {
                var pct = Math.round((d.current / d.total) * 100);
                progress.value = pct;
                detail.textContent = d.current + ' / ' + d.total + ' photos processed';
            }

            if (d.done) {
                window.location.href = '{{ url_for("web.results") }}';
                return;
            }

            if (d.error) {
                statusText.textContent = 'Error: ' + d.error;
                detail.textContent = 'Please try again.';
                return;
            }

            // Poll again in 2 seconds
            setTimeout(pollProgress, 2000);
        })
        .catch(function() {
            // Retry on network error
            setTimeout(pollProgress, 3000);
        });
    }
});
</script>
{% endblock %}
